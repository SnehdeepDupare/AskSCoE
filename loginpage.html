<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AskSCoE</title>
    <link rel="stylesheet" href="login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+Bhai+2&display=swap" rel="stylesheet">
</head>

<body>
    <section class="vh-100" style="background-color: #f2f3df;">
        <div class="container py-5 h-100">
            <div class="row d-flex justify-content-center align-items-center h-100">
                <div class="col col-xl-10">
                    <div class="card" style="border-radius: 1rem;">
                        <div class="row g-0">
                            <div class="col-md-6 col-lg-5 d-none d-md-block">
                                <img src="https://mdbcdn.b-cdn.net/img/Photos/new-templates/bootstrap-login-form/img1.webp"
                                    alt="login form" class="img-fluid" style="border-radius: 1rem 0 0 1rem;" />
                            </div>
                            <div class="col-md-6 col-lg-7 d-flex align-items-center">
                                <div class="card-body p-4 p-lg-5 text-black">

                                    <form class="login">
                                        <h5 class="fw-normal mb-3 pb-3" style="letter-spacing: 1px;">SIGN INTO YOUR
                                            ACCOUNT</h5>

                                        <div class="form-outline mb-4">
                                            <label class="form-label" for="form2Example17"></label>
                                            <input type="email" id="form2Example17" class="form-control form-control-lg"
                                                placeholder="Email Address" />

                                        </div>
                                        <br>
                                        <div class="form-outline mb-4">
                                            <label class="form-label" for="form2Example27"></label>
                                            <input type="password" id="form2Example27"
                                                class="form-control form-control-lg" placeholder="Password" />

                                        </div><br>

                                        <div class="pt-1 mb-4">
                                            <a href="index.html">
                                                <button class="btn btn-dark btn-lg btn-block" type="button"
                                                id="butn">
                                                <b>LOGIN</b>
                                                </button>
                                            </a>
                                        </div>
                                        <br><br>
                                        <a class="small text-muted" href="#!">Forgot password?</a><br><br>
                                        <p class="mb-5 pb-lg-2" style="color: #393f81;">Don't have an account? <a
                                                href="#!" style="color: #393f81;">Register here</a></p>


                                    </form>

                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
