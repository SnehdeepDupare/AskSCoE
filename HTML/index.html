<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AskSCoE</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-iYQeCzEYFbKjA/T2uDLTpkwGzCiq6soy8tYaI1GyVh/UjpbCx/TYkiZhlZB6+fzT" crossorigin="anonymous">
    <!-- Bootstrap icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Baloo+Bhai+2&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../CSS/style.css">
    <link rel="shortcut icon" href="../IMAGES/logos/test_logo_1.png" type="image/x-icon">

</head>
<body>
    <nav class="sidebar">
        <header>
            <div class="image-text">
                <span class="image">
                    <img src="../IMAGES/logos/test_logo_1.png" alt="logo">
                </span>

                <div class="text logo-text">
                    <span class="webname">AskSCoE</span>
                </div>
            </div>
        </header>

        <div class="sidebar-menu">
            <div class="menu">
                <!-- <ul class="menu-links"> -->
                    <li class="sidebar-item">
                        <a href="#">
                            <i class="bi bi-house-fill"></i>
                            <span class="text sidebar-text">
                                Home
                            </span>
                        </a>
                    </li>

                    <li class="sidebar-item">
                        <a href="#">
                            <i class="bi bi-download"></i>
                            <span class="text sidebar-text">
                                Saved
                            </span>
                        </a>
                    </li>

                    <li class="sidebar-item">
                        <a href="#">
                            <i class="bi bi-person-circle"></i>
                            <span class="text sidebar-text">
                                Profile
                            </span>
                        </a>
                    </li>

                    <li class="sidebar-item">
                        <a href="#">
                            <i class="bi bi-gear-wide-connected"></i>
                            <span class="text sidebar-text">
                                Settings
                            </span>
                        </a>
                    </li>
                <!-- </ul> -->
            </div>

            <div class="bottom-content">
                <li class="sidebar-item">
                    <a href="loginpage.html">
                        <i class="bi bi-power"></i>
                        <span class="text sidebar-text">
                            Logout
                        </span>
                    </a>
                </li>

                <li class="mode">
                    <div class="moon-sun">
                        <i class="bi bi-moon moon"></i>
                        <i class="bi bi-brightness-high sun"></i>
                    </div>
                    <span class="mode-text text">Dark mode</span>

                    <div class="toggle-switch">
                        <span class="switch"></span>
                    </div>
                </li>
            </div>
        </div>
    </nav>

    <section class="main-section">
        <div class="top">
            <span class="heading">Home</span>
            <section class="askbar">
                <div class="username">
                    <i class="bi bi-person-circle"></i>
                        <span class="acc-name">Username</span>
                </div>
                <span class="textarea-text">
                    Ask Your Questions Here!
                </span>
                <textarea name="query" id="input" cols="30" rows="10" placeholder="Enter your query"></textarea>
                <button type="submit" class="post-btn">Post</button>
            </section>
        </section>

        <div class="posts-section">
            This is posts section
        </div>
    </div>

    <script src="../JAVASCRIPT/index.js"></script>
</body>
</html>
