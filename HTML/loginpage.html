<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AskSCoE</title>
    <link rel="stylesheet" href="../CSS/login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+Bhai+2&display=swap" rel="stylesheet">
</head>

<body>
    <section class="vh-100" style="background-color: #f2f3df;">
        <div class="container py-5 h-100">
            <div class="row d-flex justify-content-center align-items-center h-100">
                <div class="col col-xl-10">
                    <div class="card" style="border-radius: 1rem;">
                        <div class="row g-0">
                            <div class="col-md-6 col-lg-5 d-none d-md-block">
                                <img src="https://mdbcdn.b-cdn.net/img/Photos/new-templates/bootstrap-login-form/img1.webp"
                                    alt="login form" class="img-fluid" style="border-radius: 1rem 0 0 1rem;" />
                            </div>
                            <div class="col-md-6 col-lg-7 d-flex align-items-center">
                                <div class="card-body p-4 p-lg-5 text-black">

                                    <form class="login">
                                        <h5 class="fw-normal mb-3 pb-3" style="letter-spacing: 1px;">SIGN INTO YOUR
                                            ACCOUNT</h5>

                                        <div class="form-outline mb-4">
                                            <label class="form-label" for="form2Example17"></label>
                                            <input type="email" id="email" class="form-control form-control-lg"
                                                placeholder="Email Address" />

                                        </div>
                                        <br>
                                        <div class="form-outline mb-4">
                                            <label class="form-label" for="form2Example27"></label>
                                            <input type="password" id="password"
                                                class="form-control form-control-lg" placeholder="Password" />

                                        </div><br>

                                        <div class="pt-1 mb-4">
                                            <a href="#">
                                                <button class="btn btn-dark btn-lg btn-block" type="button"
                                                    id="loginBtn">
                                                    <b>LOGIN</b>
                                                </button>
                                            </a>
                                        </div>
                                        <br><br>
                                        <a class="small text-muted" href="#!">Forgot password?</a><br><br>
                                        <p class="mb-5 pb-lg-2" style="color: #393f81;">Don't have an account? <a
                                                href="registration.html" style="color: #393f81;">Register here</a></p>


                                    </form>

                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>


<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.10.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.10.0/firebase-auth.js";
    import { getDatabase, set, ref, update } from "https://www.gstatic.com/firebasejs/9.10.0/firebase-database.js";


    // TODO: Add SDKs for Firebase products that you want to use
    // https://firebase.google.com/docs/web/setup#available-libraries

    // Your web app's Firebase configuration
    const firebaseConfig = {
        apiKey: "AIzaSyCQpiWauiLFGOTR1I3rrjdzaP4Wb_NsQCo",
        authDomain: "askscoe.firebaseapp.com",
        projectId: "askscoe",
        storageBucket: "askscoe.appspot.com",
        messagingSenderId: "619226149936",
        appId: "1:619226149936:web:58d6f17af91214fccf29f5"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    // const database = getDatabase(app);

    // firebase.initializeApp(firebaseConfig);

    const database = getDatabase(app)
    const auth = getAuth()

    loginBtn.addEventListener('click', (e) => {
        var email = document.getElementById('email').value
        var password = document.getElementById('password').value
        // var dt = new Date();

        if (validate_email(email) == false || validate_password(password) == false) {
            alert('Check your email or password')
            return
        }

        signInWithEmailAndPassword(auth, email, password)
            .then(function () {
                var user = auth.currentUser

                // var database_ref = database.ref()

                var user_data = {
                    last_login: new Date()
                }

                // database_ref.child('users/' + user.uid).set(user_data)

                update(ref(database, 'users/' + user.uid), {
                    last_login: new Date()
                })

                alert('User Logged In')
                // window.location = "index.html"
            })
            .catch(function (error) {
                var error_code = error.code
                var error_message = error.message

                alert(error_message)
            })


    })

    // Validate Functions
    function validate_email(email) {
            const expression = /^[^@]+@\w+(\.\w+)+\w$/
            if (expression.test(email) == true) {
                // Email is good
                return true
            } else {
                // Email is not good
                return false
            }
        }

  function validate_password(password) {
            // Firebase only accepts lengths greater than 8
            if (password < 8) {
                return false
            } else {
                return true
            }
        }
</script>

</html>
